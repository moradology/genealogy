name: checks
on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: astral-sh/setup-uv@v5
        with:
          # no uv.lock here (stdlib + PEP 723 scripts); default cache glob warns
          enable-cache: false
      - name: Install pinned playwright + chromium
        run: |
          npm ci --no-fund --no-audit
          npx playwright install chromium --with-deps
      - name: Run the gate
        run: sh tools/check.sh
